<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting Game - Settings Hub</title>
    <style>
        :root {
            --emerald-glow: #68BA7F;
            --pure-black: #000;
            --liquid-glass: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
        }

        .hub-container {
            width: 100%;
            height: 100%;
            background: var(--pure-black);
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            backdrop-filter: blur(40px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            color: var(--emerald-glow);
            text-shadow: 0 0 10px var(--emerald-glow);
        }

        .close-btn {
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
        }

        .close-btn:hover {
            opacity: 1;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--liquid-glass);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 20px;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .card:hover {
            border-color: var(--emerald-glow);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(104, 186, 127, 0.1);
        }

        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            margin-bottom: 10px;
        }

        .value {
            font-size: 18px;
            font-weight: 600;
        }

        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Avant-Garde Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--liquid-glass);
            transition: .4s;
            border-radius: 34px;
            border: 1px solid var(--border-glow);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: #fff;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--emerald-glow); }
        input:checked + .slider:before { transform: translateX(26px); }

        .footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="hub-container">
        <div class="header">
            <div class="title">Kinetic Hub</div>
            <div class="close-btn" id="closeHub">ESC [EXIT]</div>
        </div>

        <div class="settings-grid">
            <div class="card">
                <div class="toggle-container">
                    <div>
                        <div class="label">Metrics Visibility</div>
                        <div class="value">Show Score</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked id="toggleScore">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="card">
                <div class="toggle-container">
                    <div>
                        <div class="label">Auto Summon</div>
                        <div class="value">Start on Boot</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="toggleBoot">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="card">
                <div class="label">Active Paradigm</div>
                <div class="value">Dino Kinetic</div>
            </div>

            <div class="card">
                <div class="label">Materiality</div>
                <div class="value">Emerald Glow</div>
            </div>
        </div>

        <div class="footer">
            <div>WAITING GAME ENGINE v0.1.0</div>
            <div>STAGING: PURE_BLACK_STIMULATION</div>
        </div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
