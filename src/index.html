<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting Game</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
        font-family: 'Inter', sans-serif;
      }
      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 20px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        position: relative;
        user-select: none;
      }
      canvas {
        background: transparent;
        image-rendering: pixelated;
      }
      .instructions {
        position: absolute;
        bottom: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
      }
      .score {
        position: absolute;
        top: 20px;
        right: 30px;
        font-size: 24px;
        font-weight: bold;
        color: #68BA7F;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="score" class="score">00000</div>
      <canvas id="gameCanvas"></canvas>
      <div class="instructions">PRESS [SPACE] TO JUMP | [H] TO HIDE</div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
