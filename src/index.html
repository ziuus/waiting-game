<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting Game</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        background: transparent !important;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 20px;
      }
      canvas {
        background: transparent !important;
        display: block;
      }
      /* Hide everything except the canvas */
      .score-container, .instructions {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="gameCanvas"></canvas>
    </div>
    <script src="main.js"></script>
  </body>
</html>
