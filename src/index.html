<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting Game</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        background: transparent !important;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        position: relative;
      }
      canvas {
        background: transparent !important;
        display: block;
      }
      #ui-layer {
        position: absolute;
        top: 20px;
        right: 40px;
        color: rgba(104, 186, 127, 0.8);
        font-family: 'Space Grotesk', sans-serif;
        text-align: right;
        pointer-events: none;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .score-value {
        font-size: 24px;
        font-weight: bold;
      }
      .high-score {
        font-size: 12px;
        opacity: 0.6;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="ui-layer">
        <div class="score-value" id="score">00000</div>
        <div class="high-score">HI <span id="highScore">00000</span></div>
      </div>
      <canvas id="gameCanvas"></canvas>
    </div>
    <script src="main.js"></script>
  </body>
</html>
