<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting Game</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
        font-family: 'Inter', sans-serif;
      }
      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: transparent;
        color: white;
        position: relative;
        user-select: none;
      }
      canvas {
        background: transparent;
        image-rendering: pixelated;
      }
      .instructions {
        position: absolute;
        bottom: 10px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        letter-spacing: 0.1em;
      }
      .score-container {
        position: absolute;
        top: 20px;
        right: 30px;
        display: flex;
        align-items: baseline;
        gap: 15px;
      }
      .score {
        font-size: 24px;
        font-weight: bold;
        color: #68BA7F;
        text-shadow: 0 2px 10px rgba(104, 186, 127, 0.3), 0 1px 2px rgba(0, 0, 0, 0.8);
      }
      .high-score {
        font-size: 14px;
        font-weight: bold;
        color: rgba(255, 255, 255, 0.3);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="score-container">
        <div id="highScore" class="high-score">HI 00000</div>
        <div id="score" class="score">00000</div>
      </div>
      <canvas id="gameCanvas"></canvas>
      <div class="instructions">PRESS [SPACE] TO JUMP | [H] TO HIDE</div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
