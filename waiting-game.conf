# Waiting Game - Hyprland Integration Module
# Add 'source = ~/.config/hypr/waiting-game.conf' to your hyprland.conf

$waitingBin = __BIN_PATH__

# Keybinds
bind = SUPER SHIFT, G, exec, $waitingBin toggle
bind = SUPER SHIFT, P, exec, $waitingBin pin

# Unified Modern Syntax (0.54.3 Verified)
windowrule = match:class ^(waiting-game-bin)$, workspace special:waiting silent
windowrule = match:class ^(waiting-game-bin)$, float 1
windowrule = match:class ^(waiting-game-bin)$, size 100% 100%
windowrule = match:class ^(waiting-game-bin)$, move 0 0
windowrule = match:class ^(waiting-game-bin)$, center 1

# Total Transparency Rules (0.54.3 Syntax)
windowrule = match:class ^(waiting-game-bin)$, blur 0
windowrule = match:class ^(waiting-game-bin)$, shadow 0

# Autostart
exec-once = $waitingBin run
