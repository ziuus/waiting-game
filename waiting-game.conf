# Waiting Game - Hyprland Integration Module
# Add 'source = ~/.config/hypr/waiting-game.conf' to your hyprland.conf

$waitingBin = __BIN_PATH__

# Keybinds
bind = SUPER SHIFT, G, togglespecialworkspace, waiting
bind = SUPER SHIFT, P, exec, $waitingBin pin

# Window Rules (Production-Ready windowrulev2)
windowrulev2 = workspace special:waiting silent, class:^(waiting-game-bin)$
windowrulev2 = float, class:^(waiting-game-bin)$
windowrulev2 = fullscreen, class:^(waiting-game-bin)$
windowrulev2 = noblur, class:^(waiting-game-bin)$
windowrulev2 = noshadow, class:^(waiting-game-bin)$

# Autostart
exec-once = $waitingBin run
