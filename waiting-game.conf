# Waiting Game - Hyprland Integration Module
# Add 'source = ~/.config/hypr/waiting-game.conf' to your hyprland.conf

$waitingBin = __BIN_PATH__

# Keybinds
bind = SUPER SHIFT, G, togglespecialworkspace, waiting
bind = SUPER SHIFT, P, exec, $waitingBin pin

# Window Rules (Classic Compatible Syntax)
windowrule = workspace special:waiting silent, ^(waiting-game-bin)$
windowrule = float, ^(waiting-game-bin)$
windowrule = size 100% 100%, ^(waiting-game-bin)$
windowrule = center, ^(waiting-game-bin)$
windowrule = no_blur, ^(waiting-game-bin)$
windowrule = no_shadow, ^(waiting-game-bin)$

# Autostart
exec-once = $waitingBin run
