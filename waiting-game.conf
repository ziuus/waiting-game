# Waiting Game - Hyprland Integration Module
# Add 'source = ~/.config/hypr/waiting-game.conf' to your hyprland.conf

$waitingBin = __BIN_PATH__

# Keybinds
bind = SUPER SHIFT, G, togglespecialworkspace, waiting
bind = SUPER SHIFT, P, exec, $waitingBin pin

# Window Rules (Latest Unified Syntax)
windowrule = workspace special:waiting silent, class:^(waiting-game-bin)$
windowrule = float, class:^(waiting-game-bin)$
windowrule = fullscreen, class:^(waiting-game-bin)$
windowrule = noblur, class:^(waiting-game-bin)$
windowrule = noshadow, class:^(waiting-game-bin)$

# Autostart
exec-once = $waitingBin run
