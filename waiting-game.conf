# Waiting Game - Hyprland Integration Module
# Add 'source = ~/.config/hypr/waiting-game.conf' to your hyprland.conf

$waitingBin = __BIN_PATH__

# Keybinds
bind = SUPER SHIFT, G, exec, $waitingBin toggle
bind = SUPER SHIFT, P, exec, $waitingBin pin

# Unified Modern Syntax (0.54.3 Verified Order & Logic)
windowrule = workspace special:waiting silent,match:class ^(waiting-game-bin)$
windowrule = float 1,match:class ^(waiting-game-bin)$
windowrule = size 100% 100%,match:class ^(waiting-game-bin)$
windowrule = move 0 0,match:class ^(waiting-game-bin)$
windowrule = center 1,match:class ^(waiting-game-bin)$

# Depth and Focus Rules (Prevents hiding background windows)
windowrule = no_blur true,match:class ^(waiting-game-bin)$
windowrule = no_shadow true,match:class ^(waiting-game-bin)$
windowrule = dimaround 0,match:class ^(waiting-game-bin)$
windowrule = stayfocused 0,match:class ^(waiting-game-bin)$
windowrule = ignorealpha 1,match:class ^(waiting-game-bin)$

# Autostart
exec-once = $waitingBin run
